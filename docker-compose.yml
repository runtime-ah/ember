services:
  ember:
    build: .
    restart: unless-stopped
    ports:
      # Bind to loopback only — Caddy proxies from localhost, no direct external access.
      - "127.0.0.1:8001:8000"
    volumes:
      - ember_data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    env_file:
      - backend/.env

  mcp:
    build: ./mcp_server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      - TODO_MCP_BACKEND_URL=http://ember:8000
      - TODO_MCP_HOST=0.0.0.0
      - TODO_MCP_PORT=8765
    depends_on:
      - ember

volumes:
  ember_data:
